<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donation Alert</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: transparent;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cairo', sans-serif;
        }

        canvas#particles {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* ===== الحاوية الرئيسية ===== */
        .alert-scene {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            opacity: 0;
            transform: scale(0.5);
            animation: scene-enter 1s 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes scene-enter {
            0%   { opacity: 0; transform: scale(0.5) translateY(40px); filter: blur(15px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        /* ===== التوهج الخلفي ===== */
        .bg-aura {
            position: absolute;
            width: 700px;
            height: 700px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.35) 0%, rgba(168, 85, 247, 0.08) 40%, transparent 70%);
            animation: aura-pulse 3s ease-in-out infinite;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes aura-pulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50%      { transform: scale(1.15); opacity: 1; }
        }

        /* ===== حلقات الطاقة ===== */
        .energy-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(168, 85, 247, 0.3);
            animation: ring-expand 2.5s ease-out infinite;
            pointer-events: none;
        }

        .energy-ring:nth-child(1) { width: 200px; height: 200px; animation-delay: 0s; }
        .energy-ring:nth-child(2) { width: 200px; height: 200px; animation-delay: 0.8s; }
        .energy-ring:nth-child(3) { width: 200px; height: 200px; animation-delay: 1.6s; }

        @keyframes ring-expand {
            0%   { transform: scale(0.5); opacity: 1; border-color: rgba(168, 85, 247, 0.6); }
            100% { transform: scale(3.5); opacity: 0; border-color: rgba(168, 85, 247, 0); }
        }

        /* ===== الأيقونة الرئيسية (3D) ===== */
        .icon-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin-bottom: 25px;
            perspective: 800px;
        }

        .icon-3d {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: icon-rotate 6s ease-in-out infinite, icon-entrance 1.2s 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        @keyframes icon-entrance {
            0%   { transform: rotateY(-180deg) scale(0); opacity: 0; }
            100% { transform: rotateY(0deg) scale(1); opacity: 1; }
        }

        @keyframes icon-rotate {
            0%, 100% { transform: rotateY(0deg) rotateX(0deg); }
            25%      { transform: rotateY(15deg) rotateX(5deg); }
            50%      { transform: rotateY(0deg) rotateX(-5deg); }
            75%      { transform: rotateY(-15deg) rotateX(5deg); }
        }

        .icon-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            background: linear-gradient(145deg, rgba(168, 85, 247, 0.9), rgba(109, 40, 217, 0.95));
            box-shadow:
                0 0 40px rgba(168, 85, 247, 0.5),
                0 0 80px rgba(168, 85, 247, 0.2),
                inset 0 2px 20px rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.15);
            backface-visibility: hidden;
        }

        /* شريط لامع يمر على الأيقونة */
        .icon-face::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            animation: shimmer 3s ease-in-out infinite;
            border-radius: 30px;
        }

        @keyframes shimmer {
            0%   { left: -60%; }
            50%  { left: 110%; }
            100% { left: 110%; }
        }

        /* الهالة المتوهجة حول الأيقونة */
        .icon-glow {
            position: absolute;
            inset: -8px;
            border-radius: 36px;
            background: linear-gradient(135deg, #a855f7, #7c3aed, #c084fc, #a855f7);
            background-size: 300% 300%;
            animation: glow-shift 3s ease infinite;
            z-index: -1;
            filter: blur(3px);
        }

        @keyframes glow-shift {
            0%, 100% { background-position: 0% 50%; }
            50%      { background-position: 100% 50%; }
        }

        /* ===== النصوص ===== */
        .alert-label {
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #c084fc;
            margin-bottom: 8px;
            opacity: 0;
            animation: label-in 0.8s 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes label-in {
            0%   { opacity: 0; letter-spacing: 20px; filter: blur(8px); }
            100% { opacity: 1; letter-spacing: 6px; filter: blur(0); }
        }

        .donor-name {
            font-size: 3.2rem;
            font-weight: 900;
            color: #ffffff;
            text-shadow:
                0 0 20px rgba(168, 85, 247, 0.6),
                0 0 60px rgba(168, 85, 247, 0.3),
                0 4px 15px rgba(0, 0, 0, 0.5);
            margin-bottom: 6px;
            opacity: 0;
            animation: name-in 1s 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            white-space: nowrap;
        }

        @keyframes name-in {
            0%   { opacity: 0; transform: translateY(30px) scale(0.8); filter: blur(10px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        .donation-amount {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fbbf24, #f59e0b, #fcd34d, #f59e0b);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow-shift 2s ease infinite, amount-in 0.8s 1.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
            text-shadow: none;
            filter: drop-shadow(0 0 15px rgba(251, 191, 36, 0.4));
        }

        @keyframes amount-in {
            0%   { opacity: 0; transform: scale(0); }
            50%  { transform: scale(1.3); }
            100% { opacity: 1; transform: scale(1); }
        }

        .donation-message {
            font-size: 1.15rem;
            color: rgba(255, 255, 255, 0.65);
            margin-top: 12px;
            font-weight: 700;
            max-width: 500px;
            opacity: 0;
            animation: msg-in 0.8s 1.6s ease forwards;
        }

        @keyframes msg-in {
            0%   { opacity: 0; transform: translateY(10px); }
            100% { opacity: 0.65; transform: translateY(0); }
        }

        /* ===== شريط التقدم السفلي ===== */
        .progress-bar-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 4px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            overflow: hidden;
            opacity: 0;
            animation: bar-in 0.5s 1.8s ease forwards;
            z-index: 20;
        }

        @keyframes bar-in {
            to { opacity: 1; }
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #a855f7, #c084fc, #a855f7);
            background-size: 200% 200%;
            animation: glow-shift 2s ease infinite, bar-drain 8s 2s linear forwards;
            border-radius: 4px;
        }

        @keyframes bar-drain {
            0%   { width: 100%; }
            100% { width: 0%; }
        }

        /* ===== الخروج ===== */
        .scene-exit .alert-scene {
            animation: scene-out 0.8s cubic-bezier(0.55, 0, 1, 0.45) forwards;
        }

        @keyframes scene-out {
            0%   { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.3); filter: blur(25px); }
        }

        /* ===== النجوم العائمة (خلفية) ===== */
        .floating-star {
            position: fixed;
            color: rgba(168, 85, 247, 0.6);
            font-size: 1.2rem;
            pointer-events: none;
            z-index: 1;
            animation: star-float 4s ease-in-out infinite;
        }

        @keyframes star-float {
            0%, 100% { transform: translateY(0) rotate(0); opacity: 0.4; }
            50%      { transform: translateY(-30px) rotate(180deg); opacity: 0.9; }
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>

    <!-- نجوم عائمة -->
    <div class="floating-star" style="top:15%;left:10%;animation-delay:0s;font-size:1rem;">✦</div>
    <div class="floating-star" style="top:25%;right:12%;animation-delay:0.5s;font-size:0.8rem;">✧</div>
    <div class="floating-star" style="top:60%;left:8%;animation-delay:1.2s;font-size:1.4rem;">✦</div>
    <div class="floating-star" style="top:70%;right:15%;animation-delay:0.8s;font-size:0.9rem;">✧</div>
    <div class="floating-star" style="top:40%;left:85%;animation-delay:1.5s;font-size:1.1rem;">✦</div>
    <div class="floating-star" style="top:80%;left:20%;animation-delay:2s;font-size:0.7rem;">✧</div>

    <div class="alert-scene" id="alertScene">
        <div class="bg-aura"></div>
        <div class="energy-ring"></div>
        <div class="energy-ring"></div>
        <div class="energy-ring"></div>

        <div class="icon-container">
            <div class="icon-glow"></div>
            <div class="icon-3d">
                <div class="icon-face">💎</div>
            </div>
        </div>

        <div class="alert-label" id="alertLabel">NEW DONATION</div>
        <div class="donor-name" id="donorName">المتبرع</div>
        <div class="donation-amount" id="donationAmount">100 SAR</div>
        <div class="donation-message" id="donationMessage">شكراً على البث الرائع! 🔥</div>
    </div>

    <div class="progress-bar-container">
        <div class="progress-bar-fill"></div>
    </div>

    <script>
        // ===== نظام الجزيئات المتطايرة =====
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const EMOJIS = ['💎', '✨', '💰', '💸', '🪙', '⭐', '💫', '🌟', '💜'];

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.emoji = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
                this.vx = (Math.random() - 0.5) * 14;
                this.vy = -(Math.random() * 10 + 5);
                this.gravity = 0.18;
                this.life = 1;
                this.decay = Math.random() * 0.012 + 0.006;
                this.size = Math.random() * 18 + 16;
                this.rotation = Math.random() * 360;
                this.rotSpeed = (Math.random() - 0.5) * 10;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.vx *= 0.98;
                this.life -= this.decay;
                this.rotation += this.rotSpeed;
            }

            draw(ctx) {
                if (this.life <= 0) return;
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.translate(this.x, this.y);
                ctx.rotate((this.rotation * Math.PI) / 180);
                ctx.font = `${this.size}px serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.emoji, 0, 0);
                ctx.restore();
            }
        }

        // إطلاق انفجار أولي من الجزيئات
        function burst(count) {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            for (let i = 0; i < count; i++) {
                const x = cx + (Math.random() - 0.5) * 400;
                const y = cy + (Math.random() - 0.5) * 200;
                particles.push(new Particle(x, y));
            }
        }

        // إطلاق جزيئات مستمرة خفيفة
        let continuousTimer = null;
        function startContinuous() {
            continuousTimer = setInterval(() => {
                const cx = canvas.width / 2;
                const cy = canvas.height / 2 - 50;
                for (let i = 0; i < 3; i++) {
                    const x = cx + (Math.random() - 0.5) * 300;
                    particles.push(new Particle(x, cy));
                }
            }, 400);
        }

        function stopContinuous() {
            clearInterval(continuousTimer);
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => p.life > 0);
            for (const p of particles) {
                p.update();
                p.draw(ctx);
            }
            requestAnimationFrame(animate);
        }
        animate();

        // ===== الصوت =====
        function playAlertSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

                // نغمة صاعدة سحرية
                const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
                notes.forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);

                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i * 0.15);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime + i * 0.15);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.15 + 0.8);

                    osc.start(audioCtx.currentTime + i * 0.15);
                    osc.stop(audioCtx.currentTime + i * 0.15 + 0.8);
                });

                // نغمة إضافية لامعة
                setTimeout(() => {
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.type = 'triangle';
                    osc2.frequency.setValueAtTime(1318.51, audioCtx.currentTime); // E6
                    gain2.gain.setValueAtTime(0.08, audioCtx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
                    osc2.start();
                    osc2.stop(audioCtx.currentTime + 1.2);
                }, 600);
            } catch (e) {
                console.log('Audio not supported');
            }
        }

        // ===== التشغيل =====
        // قراءة البيانات من URL (اختياري)
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name') || 'المتبرع';
        const amount = params.get('amount') || '100 SAR';
        const message = params.get('message') || 'شكراً على البث الرائع! 🔥';

        document.getElementById('donorName').textContent = name;
        document.getElementById('donationAmount').textContent = amount;
        document.getElementById('donationMessage').textContent = message;

        // تشغيل التأثيرات
        setTimeout(() => {
            playAlertSound();
            burst(60);
            startContinuous();
        }, 400);

        // انفجار ثاني بعد ظهور الاسم
        setTimeout(() => burst(40), 1200);

        // انفجار ثالث مع المبلغ
        setTimeout(() => burst(30), 1600);

        // إخفاء الالرت بعد المدة
        const alertDuration = parseInt(params.get('duration')) || 10;
        setTimeout(() => {
            document.body.classList.add('scene-exit');
            stopContinuous();
            burst(50); // انفجار أخير
        }, alertDuration * 1000);
    </script>
</body>
</html>
